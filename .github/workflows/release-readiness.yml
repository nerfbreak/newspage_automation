name: Release Readiness

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    name: Offline Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run static readiness audit
        run: python scripts/production_readiness_audit.py --format markdown

      - name: Install smoke test dependencies
        run: python -m pip install pandas==3.0.2 openpyxl==3.1.5

      - name: Run smoke tests
        run: python -m unittest discover -s tests/smoke

      - name: Install dependency scanner
        run: python -m pip install pip-audit

      - name: Run dependency CVE scan
        run: python -m pip_audit -r requirements.txt --no-deps --disable-pip --progress-spinner off --ignore-vuln CVE-2025-3000

  live-health:
    name: Live Health Probe
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release-gate

    steps:
      - name: Check Streamlit Cloud health endpoint
        run: |
          response="$(curl --fail --silent --show-error --max-time 20 https://newspage.streamlit.app/healthz)"
          test "$response" = '{"status":"ok"}'
