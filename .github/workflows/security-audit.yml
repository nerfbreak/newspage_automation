name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-security:
    name: Static Production Readiness Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run static readiness audit
        run: python scripts/production_readiness_audit.py --format markdown

      - name: Install smoke test dependencies
        run: python -m pip install pandas==3.0.2 openpyxl==3.1.5

      - name: Run smoke tests
        run: python -m unittest discover -s tests/smoke

  dependency-cve:
    name: Dependency CVE Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit
        run: python -m pip_audit -r requirements.txt --no-deps --disable-pip --progress-spinner off --ignore-vuln CVE-2025-3000
